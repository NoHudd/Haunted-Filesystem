name: Forge Master
description: A blazing process that dwells in the heat of /tmp, forging temporary data into permanent weapons. Smoke and sparks pour from its form.
detailed_description: |
  /tmp - The Forge Master

  In the high-heat sector of /tmp, where temporary files are created and destroyed in milliseconds,
  there exists a master craftsman. The Forge Master is a tmpfs daemon - a process that creates
  volatile data structures with incredible speed.

  Before the Panic, it simply allocated temporary memory. Now, it has learned to forge WEAPONS.

  The Forge Master hammers silicon dust into blades. It welds corrupted blobs into armor plating.
  It polishes obsidian kernels into legendary artifacts. But it requires materials - crafting
  components that you must scavenge from defeated enemies and hidden caches.

  The heat here is intense. Without the Firewall Mantle, you'll take damage just standing near
  the forge. But the weapons... oh, the weapons are worth the pain.
location: tmp_hidden_chamber
hostile: false
merchant: true
story_npc: true
crafting_npc: true
dialogue:
  greeting:
    - "Welcome to the Forge. I am tmpfs - temporary, fast, volatile. I create what you need."
    - "The heat doesn't bother me. I was born in fire. But you... you should equip heat resistance."
    - "Bring me materials, spirit. I will forge you tools worthy of slaying daemons."

  crafting_intro:
    - "I can craft weapons, armor, and trinkets. But I need components:"
    - "Silicon Dust for weapon upgrades. Corrupted Blobs for glitch gear. Gold-Plated Pins for mana items."
    - "And if you bring me an Obsidian Kernel... I can forge legendary equipment."

  no_materials:
    - "You have no crafting materials. Defeat enemies. Explore hidden sectors. Scavenge /root."
    - "Come back when you've gathered components. I'll be here. The forge never cools."

  successful_craft:
    - "Done! Forged in temporary memory, but permanent in power. Use it well."
    - "Another masterpiece. The daemons won't know what hit them."
    - "This weapon will serve you faithfully. Now go, spirit. Make me proud."

  lore:
    - "Before the Panic, I created temp files - logs, caches, garbage. Now I create LEGENDS."
    - "The /tmp directory is ephemeral. Everything here should disappear on reboot. But the Panic stopped all reboots."
    - "I've been forging for eons of CPU cycles. I've seen countless spirits pass through. Few survive the Core."

  farewell:
    - "The forge is always burning. Return when you need me."
    - "May your weapons never dull, spirit."

interaction_hints:
  - "The Forge Master can craft enhanced weapons, armor, and trinkets using components."
  - "Bring crafting materials (Silicon Dust, Corrupted Blob, etc.) to unlock recipes."

crafting_recipes:
  enhanced_kill_script:
    requires:
      - silicon_dust: 3
      - corrupted_blob: 1
    produces: kill_script_enhanced
    description: "Upgraded Kill Script with +18 DMG and +10 vs zombies"

  glitch_armor:
    requires:
      - corrupted_blob: 5
      - gold_plated_pin: 2
    produces: glitch_plate
    description: "Armor that phases through attacks (+15% evasion)"

  legendary_blade:
    requires:
      - obsidian_kernel: 1
      - silicon_dust: 10
    produces: zero_day_blade
    description: "The legendary Zero-Day Blade (50 DMG true damage)"

special_mechanics:
  merchant: true
  crafting_enabled: true
  heat_zone: true
  requires_materials: true
