weapons:
  # STARTER WEAPONS (Class-specific, Common rarity)
  segfault_shield:
    name: "Segmentation Fault Shield"
    description: "A defensive barrier formed from a crashed memory segment. Basic but reliable protection."
    type: "weapon"
    damage: 8
    allowed_classes:
      - guardian
    rarity: common
    tags: ["shields", "defensive", "starter"]
    allowed_zones: ["home", "safe"]
    persistence: "persistent"
    special_effects:
      - type: "defensive_bonus"
        value: 2
        description: "+2 DEF while equipped"

  null_pointer:
    name: "Null Pointer"
    description: "A reference to nothing that somehow deals damage. The paradox is your weapon."
    type: "weapon"
    damage: 10
    allowed_classes:
      - weaver
    rarity: common
    tags: ["offensive", "exploit", "starter"]
    allowed_zones: ["home", "corrupted"]
    persistence: "persistent"

  daemon_whisper:
    name: "Daemon Whisper"
    description: "An echo of a terminated process. Its ghostly wails strike at corrupted code."
    type: "weapon"
    damage: 7
    allowed_classes:
      - shaman
    rarity: common
    tags: ["mystical", "staves", "starter"]
    allowed_zones: ["home", "mystical"]
    persistence: "persistent"
    special_effects:
      - type: "spirit_damage"
        value: 2
        description: "+2 damage against ghost-type enemies"

  # COMMON WEAPONS
  dangling_pointer:
    name: "Dangling Pointer"
    description: "A jagged shard of lost memory. Its unstable nature makes it unreliable but dangerous."
    type: "weapon"
    damage: 5
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: common
    tags: ["memory", "unstable", "offensive"]
    allowed_zones: ["home", "var", "tmp", "bin"]
    persistence: "ephemeral"
    special_effects:
      - type: "miss_chance"
        value: 10
        description: "10% chance to miss due to pointer instability"

  # UNCOMMON WEAPONS
  kill_script:
    name: "Kill Script"
    description: "A SIGKILL command made physical. Particularly effective against zombie processes that refuse to die."
    type: "weapon"
    damage: 12
    allowed_classes:
      - weaver
    rarity: uncommon
    tags: ["script", "signal", "offensive", "anti_zombie"]
    allowed_zones: ["bin", "etc", "usr", "tmp"]
    persistence: "persistent"
    special_effects:
      - type: "bonus_damage_vs_type"
        target_type: "zombie"
        value: 5
        description: "+5 damage against zombie-type enemies"

  # RARE WEAPONS
  dangling_reference:
    name: "Dangling Reference"
    description: "A sharp logic error that bypasses security protocols. Its precision cuts through defensive barriers."
    type: "weapon"
    damage: 18
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: rare
    tags: ["logic_error", "armor_penetration", "offensive"]
    allowed_zones: ["lib", "usr", "dev", "etc"]
    persistence: "persistent"
    special_effects:
      - type: "armor_penetration"
        value: 15
        description: "Ignores 15% of enemy armor"

  # LEGENDARY WEAPONS
  zero_day_blade:
    name: "The Zero-Day Blade"
    description: "An unpatchable exploit made manifest. No defense can stand against an unknown vulnerability."
    type: "weapon"
    damage: 50
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: legendary
    tags: ["legendary", "exploit", "true_damage", "zero_day"]
    allowed_zones: ["root"]
    persistence: "persistent"
    special_effects:
      - type: "true_damage"
        description: "Deals true damage that cannot be mitigated by any armor or defensive abilities"
      - type: "exploit"
        description: "Bypasses all defensive protocols and immunities"
