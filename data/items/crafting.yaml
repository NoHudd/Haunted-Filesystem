crafting:
  # COMMON CRAFTING COMPONENTS
  silicon_dust:
    name: "Silicon Dust"
    description: "Fine powder from a ground-up CPU. Used as a base material for weapon upgrades."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: common
    tags: ["crafting", "material", "weapon_upgrade"]
    allowed_zones: ["home", "var", "tmp", "bin", "dev"]
    persistence: "persistent"
    usable: false
    crafting_tier: "basic"
    on_use:
      message: "This is a crafting material. Take it to the Forge Master in /tmp to use it."

  corrupted_blob:
    name: "Corrupted Blob"
    description: "A sticky, unreadable mess of data bits. Paradoxically useful for crafting glitch-based gear."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: common
    tags: ["crafting", "material", "glitch", "corrupted"]
    allowed_zones: ["var", "tmp", "deprecated_dir"]
    persistence: "persistent"
    usable: false
    crafting_tier: "basic"
    on_use:
      message: "This is a crafting material. Take it to the Forge Master in /tmp to use it."

  "fragment.dat":
    name: "fragment.dat"
    description: "A small shard of corrupted data left behind by a defeated daemon minion. Useless on its own, but crafters value these remnants."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: common
    tags: ["crafting", "material", "corrupted", "fragment"]
    allowed_zones: ["home", "var", "tmp", "bin"]
    persistence: "persistent"
    usable: false
    crafting_tier: "basic"
    on_use:
      message: "This is a crafting material. Take it to the Forge Master in /tmp to use it."

  random_memory_fragment:
    name: "Memory Fragment"
    description: "A random chunk of volatile memory captured before it could dissipate. Its contents are scrambled but potentially valuable for crafting."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: common
    tags: ["crafting", "material", "memory", "volatile"]
    allowed_zones: ["home", "var", "tmp"]
    persistence: "persistent"
    usable: false
    crafting_tier: "basic"
    on_use:
      message: "This is a crafting material. Take it to the Forge Master in /tmp to use it."

  # UNCOMMON CRAFTING COMPONENTS
  gold_plated_pin:
    name: "Gold-Plated Pin"
    description: "A physical connector from an ancient board. Its conductive properties enhance mana-based equipment."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: uncommon
    tags: ["crafting", "material", "mana_enhancement"]
    allowed_zones: ["bin", "etc", "usr", "lib"]
    persistence: "persistent"
    usable: false
    crafting_tier: "advanced"
    on_use:
      message: "This is a crafting material. Take it to the Forge Master in /tmp to use it."

  # EPIC CRAFTING COMPONENTS
  obsidian_kernel:
    name: "Obsidian Kernel"
    description: "The hardened heart of an old OS version. Required for crafting legendary-tier equipment."
    type: "crafting_material"
    allowed_classes:
      - guardian
      - weaver
      - shaman
    rarity: epic
    tags: ["crafting", "material", "legendary_tier"]
    allowed_zones: ["root", "dev"]
    persistence: "persistent"
    usable: false
    crafting_tier: "legendary"
    special_effects:
      - type: "legendary_crafting_component"
        description: "Required for all legendary-tier crafting recipes"
    on_use:
      message: "This is a rare crafting material. Take it to the Forge Master in /tmp to craft legendary equipment."
