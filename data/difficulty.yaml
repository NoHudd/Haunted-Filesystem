# Live difficulty multipliers. Re-tuned 2026-07-08 after enemies began awarding their real
# `experience` value (was a dead flat-50 default; typed-Enemy work). Real XP roughly halved
# leveling income, so xp_gain was raised (~2x) to restore the band. Sim @60 runs/cell:
# medium G90/W77/S95 (~87% avg), hard G65/W65/S63 (~64% avg, tight ~2pt spread), easy ~100%.
# Hard is harder than medium via enemy_hp 1.15 (longer fights), not per-hit damage.
# See docs/DIFFICULTY_SIM_STATUS.md.
easy:
  enemy_hp: 0.85
  enemy_damage: 0.9
  xp_gain: 2.4
medium:
  enemy_hp: 0.95
  enemy_damage: 0.93
  xp_gain: 2.0
hard:
  enemy_hp: 1.15
  enemy_damage: 0.85
  xp_gain: 1.8
