# Difficulty modes — per-mode multipliers applied to enemy stats and XP.
# Calibrated by the simulation tuner (see docs/DIFFICULTY_SIM_DESIGN.md).
# Target win rates vs optimal play: easy 90-98%, medium 75-85%, hard 50-70%.
easy:
  enemy_hp: 0.85
  enemy_damage: 0.95
  xp_gain: 1.3
medium:
  enemy_hp: 0.95
  enemy_damage: 0.975
  xp_gain: 1.0
hard:
  enemy_hp: 1.15
  enemy_damage: 0.85
  xp_gain: 0.85
